name: Daily RIA Leads

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r src/src/requirements.txt

      - name: Run daily scan
        run: python src/src/main.py

      - name: Commit updated leads JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/leads.json
          git commit -m "Update leads JSON" || echo "No changes to commit"
          git push
